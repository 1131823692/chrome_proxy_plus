<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title data-i18n="settings_title"></title>
    <link rel="stylesheet" href="popup.css"/>
</head>
<body>
<div class="container">
    <h2 data-i18n="settings_title"></h2>

    <fieldset>
        <div class="field">
            <span class="field-label" data-i18n="mode_label"></span>
            <label class="mode-btn" data-mode="direct">
                <input type="radio" name="mode" value="direct"/><span data-i18n="mode_direct"></span>
            </label>
            <label class="mode-btn" data-mode="fixed_servers">
                <input type="radio" name="mode" value="fixed_servers"/><span data-i18n="mode_fixed"></span>
            </label>
            <label class="mode-btn" data-mode="auto_detect">
                <input type="radio" name="mode" value="auto_detect"/><span data-i18n="mode_auto"></span>
            </label>
            <label class="mode-btn active" data-mode="system">
                <input type="radio" name="mode" value="system" checked/><span data-i18n="mode_system"></span>
            </label>
        </div>

        <div class="proxy-config">
            <div class="field">
                <span class="field-label" data-i18n="scheme_label"></span>
                <label class="scheme-btn active" data-scheme="http">
                    <input type="radio" name="scheme" value="http" checked/>HTTP
                </label>
                <label class="scheme-btn" data-scheme="https">
                    <input type="radio" name="scheme" value="https"/>HTTPS
                </label>
                <label class="scheme-btn" data-scheme="socks4">
                    <input type="radio" name="scheme" value="socks4"/>SOCKS4
                </label>
                <label class="scheme-btn" data-scheme="socks5">
                    <input type="radio" name="scheme" value="socks5"/>SOCKS5
                </label>
            </div>

            <div class="field">
                <span class="field-label" data-i18n="host_label"></span>
                <input type="text" id="host" value="127.0.0.1" data-i18n-placeholder="host_placeholder"/>
            </div>

            <div class="field">
                <span class="field-label" data-i18n="port_label"></span>
                <input type="number" id="port" value="7897" min="1" max="65535" data-i18n-placeholder="port_placeholder"/>
            </div>

            <div class="field">
                <span class="field-label" data-i18n="rules_label"></span>
                <label class="rule-btn active" data-rule="http">
                    <input type="checkbox" name="rules" value="http" checked/>HTTP
                </label>
                <label class="rule-btn active" data-rule="https">
                    <input type="checkbox" name="rules" value="https" checked/>HTTPS
                </label>
                <label class="rule-btn active" data-rule="ftp">
                    <input type="checkbox" name="rules" value="ftp" checked/>FTP
                </label>
            </div>
        </div>
    </fieldset>

    <div class="actions">
        <button class="btn-save" id="btn-save" data-i18n="btn_save"></button>
    </div>
    <div class="hint" data-i18n="hint"></div>
</div>

<script src="popup.js"></script>
</body>
</html>
